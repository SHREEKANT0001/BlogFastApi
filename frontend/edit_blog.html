<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Blog</title>
</head>
<body>

    <h1>Edit Blog</h1>

    <form action="/edit/{{ blog.id }}" method="POST">

        <input
            type="text"
            name="title"
            value="{{ blog.title }}"
            required>

        <input
            type="text"
            name="author"
            value="{{ blog.author }}"
            required>

        <textarea
            name="content"
            required>{{ blog.content }}</textarea>

        <button type="submit">
            Update Blog
        </button>

    </form>

    <br>

    <a href="/">
        Back Home
    </a>

</body>
</html>
