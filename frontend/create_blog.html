<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog</title>
</head>
<body>

    <h1>Create Blog</h1>

    <form action="/create" method="POST">

        <input
            type="text"
            name="title"
            placeholder="Blog Title"
            required>

        <input
            type="text"
            name="author"
            placeholder="Author"
            required>

        <textarea
            name="content"
            placeholder="Write your blog here..."
            required></textarea>

        <button type="submit">
            Publish Blog
        </button>

    </form>

    <br>

    <a href="/">
        Back to Home
    </a>

</body>
</html>
