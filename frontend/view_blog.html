<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ blog.title }} — BlogSpace</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4fb; color: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; background: #fff; border-bottom: 1px solid #e8e6f9; position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-size: 20px; font-weight: 600; color: #534AB7; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-links a { font-size: 14px; color: #666; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #534AB7; }
    .btn-nav { font-size: 13px; padding: 8px 20px; background: #534AB7; color: #fff !important; border-radius: 999px; display: flex; align-items: center; gap: 6px; transition: background 0.2s, transform 0.1s; }
    .btn-nav:hover { background: #3C3489 !important; transform: translateY(-1px); }
    .article-page { flex: 1; padding: 48px 24px 64px; }
    .article-wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; flex-wrap: wrap; }
    .breadcrumb a { color: #534AB7; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .cur { color: #1a1a2e; font-weight: 500; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .article-card { background: #fff; border-radius: 20px; border: 1.5px solid #e8e6f9; overflow: hidden; box-shadow: 0 4px 24px rgba(83,74,183,0.07); }
    .article-top { background: linear-gradient(135deg, #534AB7 0%, #3C3489 55%, #1D9E75 100%); padding: 48px 40px 40px; position: relative; overflow: hidden; }
    .article-top::before { content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: rgba(255,255,255,0.05); border-radius: 50%; }
    .article-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.15); color: #fff; font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 999px; margin-bottom: 20px; letter-spacing: 0.04em; position: relative; }
    .article-title { font-size: clamp(22px, 4vw, 32px); font-weight: 700; color: #fff; line-height: 1.25; margin-bottom: 24px; position: relative; max-width: 620px; }
    .article-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: relative; }
    .meta-chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.9); font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.2); }
    .meta-chip i { font-size: 13px; }
    .progress-bar-wrap { height: 3px; background: #e8e6f9; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #534AB7, #1D9E75); width: 0%; transition: width 0.1s linear; }
    .article-body { padding: 40px 40px 36px; border-bottom: 1px solid #f0eef9; }
    .article-content { font-size: 17px; line-height: 1.85; color: #2c2c3e; white-space: pre-wrap; word-break: break-word; }
    .reaction-bar { padding: 20px 40px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0eef9; flex-wrap: wrap; }
    .reaction-label { font-size: 13px; color: #888; margin-right: 4px; }
    .react-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 999px; border: 1.5px solid #e0ddf7; background: #fff; cursor: pointer; color: #555; transition: all 0.15s; user-select: none; font-family: inherit; }
    .react-btn:hover { border-color: #534AB7; color: #534AB7; background: #EEEDFE; }
    .react-btn.active { background: #EEEDFE; border-color: #534AB7; color: #534AB7; }
    .react-btn .count { font-size: 12px; opacity: 0.8; }
    .share-row { padding: 18px 40px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0eef9; flex-wrap: wrap; }
    .share-label { font-size: 13px; color: #888; margin-right: 4px; }
    .share-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 999px; border: 1.5px solid #e0ddf7; background: #fff; cursor: pointer; color: #555; transition: all 0.15s; font-family: inherit; }
    .share-btn:hover { border-color: #AFA9EC; color: #534AB7; }
    .article-actions { padding: 24px 40px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .actions-left { flex: 1; }
    .actions-right { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; padding: 11px 22px; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; transition: all 0.15s; }
    .btn-ghost { background: #fff; color: #666; border: 1.5px solid #e0ddf7; }
    .btn-ghost:hover { border-color: #534AB7; color: #534AB7; }
    .btn-teal { background: #E1F5EE; color: #0F6E56; border: 1.5px solid #9FE1CB; }
    .btn-teal:hover { background: #9FE1CB; transform: translateY(-1px); }
    .btn-danger { background: #FAECE7; color: #993C1D; border: 1.5px solid #F5C4B3; }
    .btn-danger:hover { background: #F5C4B3; transform: translateY(-1px); }
    .next-card { background: #fff; border-radius: 16px; border: 1.5px solid #e8e6f9; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; text-decoration: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .next-card:hover { border-color: #AFA9EC; box-shadow: 0 4px 16px rgba(83,74,183,0.1); }
    .next-card-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .next-card-title { font-size: 15px; font-weight: 600; color: #534AB7; }
    .next-card i { font-size: 22px; color: #AFA9EC; flex-shrink: 0; }
    footer { text-align: center; padding: 24px; font-size: 14px; color: #888; border-top: 1px solid #e8e6f9; background: #fff; margin-top: auto; }
    footer span { color: #534AB7; font-weight: 600; }
    .toast { position: fixed; bottom: 28px; right: 28px; background: #534AB7; color: #fff; padding: 12px 22px; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 9999; display: flex; align-items: center; gap: 8px; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 600px) { .article-top { padding: 32px 22px 28px; } .article-body { padding: 28px 22px 24px; } .reaction-bar, .share-row, .article-actions { padding: 16px 20px; } .article-actions { flex-direction: column; } .actions-right { width: 100%; } .btn { width: 100%; justify-content: center; } }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/"><i class="ti ti-sparkles"></i> BlogSpace</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/create" class="btn-nav"><i class="ti ti-pencil"></i> Write a post</a>
    </div>
  </nav>

  <div class="article-page">
    <div class="article-wrap">

      <div class="breadcrumb">
        <a href="/"><i class="ti ti-home"></i> Home</a>
        <i class="ti ti-chevron-right"></i>
        <span class="cur">{{ blog.title }}</span>
      </div>

      <div class="article-card">

        <div class="article-top">
          <div class="article-pill"><i class="ti ti-sparkles"></i> Blog Post</div>
          <h1 class="article-title">{{ blog.title }}</h1>
          <div class="article-meta">
            <span class="meta-chip"><i class="ti ti-file-text"></i> Post #{{ blog.id }}</span>
            <span class="meta-chip"><i class="ti ti-user"></i> {{ blog.author }}</span>
            <span class="meta-chip"><i class="ti ti-world"></i> Published</span>
          </div>
        </div>

        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="article-body">
          <div class="article-content">{{ blog.content }}</div>
        </div>

        <div class="reaction-bar">
          <span class="reaction-label">Reactions</span>
          <button class="react-btn" onclick="react(this)"><i class="ti ti-heart"></i> Like <span class="count">0</span></button>
          <button class="react-btn" onclick="react(this)"><i class="ti ti-bulb"></i> Insightful <span class="count">0</span></button>
          <button class="react-btn" onclick="react(this)"><i class="ti ti-star"></i> Favourite <span class="count">0</span></button>
          <button class="react-btn" onclick="react(this)"><i class="ti ti-rocket"></i> Inspiring <span class="count">0</span></button>
        </div>

        <div class="share-row">
          <span class="share-label">Share</span>
          <button class="share-btn" onclick="copyLink()"><i class="ti ti-link"></i> Copy link</button>
          <button class="share-btn" onclick="showToast('Sharing coming soon!')"><i class="ti ti-brand-twitter"></i> Twitter</button>
          <button class="share-btn" onclick="showToast('Sharing coming soon!')"><i class="ti ti-brand-linkedin"></i> LinkedIn</button>
        </div>

        <div class="article-actions">
          <div class="actions-left">
            <a href="/" class="btn btn-ghost"><i class="ti ti-arrow-left"></i> All posts</a>
          </div>
          <div class="actions-right">
            <a href="/edit/{{ blog.id }}" class="btn btn-teal"><i class="ti ti-edit"></i> Edit post</a>
            <a href="/delete/{{ blog.id }}" class="btn btn-danger"><i class="ti ti-trash"></i> Delete</a>
          </div>
        </div>

      </div>

      <a href="/" class="next-card">
        <div>
          <div class="next-card-label">Continue reading</div>
          <div class="next-card-title">Browse all posts on BlogSpace</div>
        </div>
        <i class="ti ti-arrow-right"></i>
      </a>

    </div>
  </div>

  <footer>
    Built with <i class="ti ti-heart" style="color:#D85A30"></i> using <span>FastAPI</span> · © 2024 BlogSpace
  </footer>
  <div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

  <script>
    window.addEventListener('scroll', () => {
      const doc = document.documentElement;
      const pct = doc.scrollHeight - doc.clientHeight > 0
        ? (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100 : 0;
      document.getElementById('progress-bar').style.width = Math.round(pct) + '%';
    });
    function react(btn) {
      const active = btn.classList.toggle('active');
      const c = btn.querySelector('.count');
      c.textContent = active ? parseInt(c.textContent) + 1 : Math.max(0, parseInt(c.textContent) - 1);
      showToast(active ? 'Reaction added!' : 'Reaction removed');
    }
    function copyLink() {
      navigator.clipboard.writeText(window.location.href)
        .then(() => showToast('Link copied to clipboard!'))
        .catch(() => showToast('Could not copy link'));
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
