<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ blog.title }} — BlogSpace</title>
  <link rel="stylesheet" href="/frontend/style.css"/>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">✦ BlogSpace</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/create" class="btn-nav">+ Write a Post</a>
      </div>
    </div>
  </nav>

  <div class="article-page">
    <div class="article-wrap">

      <div class="breadcrumb">
        <a href="/">Home</a>
        <span class="breadcrumb-sep">/</span>
        <span>{{ blog.title }}</span>
      </div>

      <div class="article-card">
        <div class="article-top">
          <div class="article-pill">✦ Blog Post</div>
          <h1 class="article-title">{{ blog.title }}</h1>
          <div class="article-meta">
            <span class="meta-chip">📖 Post #{{ blog.id }}</span>
            <span class="meta-chip">🕐 Just now</span>
            <span class="meta-chip">✦ BlogSpace</span>
          </div>
        </div>

        <div class="article-content">{{ blog.body }}</div>

        <div class="article-actions">
          <a href="/" class="btn btn-ghost">← All Posts</a>
          <a href="/blog/{{ blog.id }}/edit" class="btn btn-teal">✏️ Edit Post</a>
          <a href="/blog/{{ blog.id }}/delete" class="btn btn-danger">🗑 Delete</a>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>Built with ❤️ using <span>FastAPI</span> · © 2024 BlogSpace</p>
  </footer>

</body>
</html>
