<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Blog</title>

    <style>
        body{
            font-family:Segoe UI;
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
            text-align:center;
            width:400px;
        }

        h1{
            color:#ef4444;
        }

        button{
            background:#ef4444;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
            margin-right:10px;
        }

        .cancel{
            text-decoration:none;
            background:#64748b;
            color:white;
            padding:12px 20px;
            border-radius:8px;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>Delete Blog</h1>

    <p>
        Are you sure you want to delete this blog?
    </p>

    <h3>
        {{ blog.title }}
    </h3>

    <form action="/delete/{{ blog.id }}" method="POST">

        <button type="submit">
            Yes Delete
        </button>

        <a href="/" class="cancel">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
